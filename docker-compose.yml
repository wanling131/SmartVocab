# 本地/演示编排：应用 + MySQL（生产请使用托管数据库与独立密钥管理）
services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-smartvocab_root}
      MYSQL_DATABASE: ${DB_NAME:-smartvocab}
    ports:
      - "3306:3306"
    volumes:
      - smartvocab_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # 必须设置，勿使用仓库占位符；未设置时 compose 会报错（与 api_launcher 生产校验一致）
      SECRET_KEY: ${SECRET_KEY:?请在 .env 中设置 SECRET_KEY，例如 openssl rand -hex 32}
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-smartvocab_root}
      DB_NAME: ${DB_NAME:-smartvocab}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5000}
    depends_on:
      db:
        condition: service_healthy

volumes:
  smartvocab_mysql:
