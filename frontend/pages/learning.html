<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习 - SmartVocab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23002FA7'/><text x='16' y='21' font-family='Arial' font-size='16' font-weight='bold' fill='white' text-anchor='middle'>SV</text></svg>">
    <link href="https://fonts.loli.net/css2?family=Caveat:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/klein-morandi.css">
    <style>
        /* Learning Page-Specific Styles */

        .letter-A { top: 5%; left: 3%; --rotation: -12deg; }
        .letter-B { top: 20%; right: 5%; --rotation: 8deg; font-size: 36px; }
        .letter-C { top: 40%; left: 2%; --rotation: 5deg; font-size: 52px; }
        .letter-D { top: 65%; right: 3%; --rotation: -10deg; }
        .letter-E { top: 85%; left: 6%; --rotation: 15deg; font-size: 38px; }

        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* 进度条 */
        .progress-section {
            background: white;
            border-radius: 20px 12px 20px 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 3px 3px 0 var(--morandi-lavender);
            border: 2px dashed var(--morandi-rose);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-text {
                color: var(--text-muted);
                font-size: 14px;
                font-weight: 600;
            }

        .progress-text span {
                color: var(--klein-blue);
                font-weight: 700;
            }

        .progress-bar {
                height: 8px;
                background: var(--morandi-beige);
                border-radius: 10px;
                overflow: hidden;
            }

        .progress-fill {
                height: 100%;
                background: linear-gradient(90deg, var(--klein-blue), var(--klein-light));
                background-size: 200% 100%;
                animation: progressGradient 3s linear infinite;
                border-radius: 10px;
                transition: width 0.5s ease;
            }

        @keyframes progressGradient {
                0% { background-position: 0% 50%; }
                100% { background-position: 200% 50%; }
            }

        /* 单词卡片 */
        .word-card {
                background: white;
                border-radius: 24px 14px 24px 14px;
                padding: 40px;
                text-align: center;
                box-shadow: 3px 3px 0 var(--morandi-lavender);
                border: 2px dashed var(--morandi-rose);
                position: relative;
            }

        .word-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 4px;
                background: linear-gradient(90deg, var(--klein-blue), var(--accent-coral));
            }

        .word-text {
                font-size: 48px;
                font-weight: 800;
                color: var(--klein-blue);
                margin-bottom: 12px;
                letter-spacing: 1px;
            }

        .word-phonetic {
                font-size: 16px;
                color: var(--text-muted);
                font-style: italic;
            }

        /* 选择题区域 */
        .choice-section {
                background: white;
                border-radius: 20px 12px 20px 12px;
                padding: 30px;
                margin-top: 24px;
                box-shadow: 3px 3px 0 var(--morandi-lavender);
                border: 2px dashed var(--morandi-rose);
            }

        .choice-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--text-dark);
                margin-bottom: 20px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

        .choice-title::before {
                content: '💭';
                font-size: 20px;
            }

        .choice-options {
                display: grid;
                gap: 12px;
            }

        .choice-option {
                padding: 16px 20px;
                background: rgba(235, 240, 249, 0.5);
                border: 2px dashed var(--morandi-beige);
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.3s ease;
                font-size: 15px;
                color: var(--text-dark);
            }

        .choice-option:hover {
                border-color: var(--klein-blue);
                background: white;
                transform: translateY(-2px);
            }

        .choice-option.selected {
                border-color: var(--klein-blue);
                background: rgba(0, 47, 167, 0.05);
            }

        .choice-option.correct {
                border-color: var(--accent-sage);
                background: rgba(107, 142, 107, 0.1);
            }

        .choice-option.wrong {
                border-color: var(--accent-coral);
                background: rgba(224, 122, 95, 0.1);
            }

        /* 翻译题区域 */
        .translation-section {
                background: white;
                border-radius: 20px 12px 20px 12px;
                padding: 30px;
                margin-top: 24px;
                box-shadow: 3px 3px 0 var(--morandi-lavender);
                border: 2px dashed var(--morandi-rose);
                display: none;
            }

        .translation-title {
                font-size: 16px;
                font-weight: 700;
                color: var(--text-dark);
                margin-bottom: 20px;
            }

        .translation-input {
                width: 100%;
                padding: 14px 18px;
                border: 2px solid var(--morandi-beige);
                border-radius: 12px;
                font-size: 15px;
                font-family: inherit;
                transition: all 0.3s ease;
            }

            .translation-input:focus {
                border-color: var(--klein-blue);
                outline: none;
            }

        .submit-btn {
                margin-top: 16px;
                width: 100%;
                padding: 14px;
                background: linear-gradient(135deg, var(--klein-blue), var(--klein-light));
                color: white;
                border: none;
                border-radius: 12px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(0, 47, 167, 0.3);
            }

        /* 完成提示 */
        .complete-section {
                display: none;
                text-align: center;
                padding: 60px 20px;
            }

        .complete-icon {
                font-size: 64px;
                margin-bottom: 16px;
            }

        .complete-text {
                font-size: 24px;
                font-weight: 700;
                color: var(--klein-blue);
                margin-bottom: 8px;
            }

        .complete-stats {
                display: flex;
                justify-content: center;
                gap: 24px;
                margin-top: 16px;
            }

            .stat-item {
                text-align: center;
            }

            .stat-value {
                font-size: 28px;
                font-weight: 800;
                color: var(--klein-blue);
            }

            .stat-label {
                font-size: 12px;
                color: var(--text-muted);
                margin-top: 4px;
            }

        /* 答题后的操作按钮（内联在卡片下方） */
        .post-answer-actions {
            display: none;
            gap: 12px;
            margin-top: 24px;
            justify-content: center;
        }

        .post-answer-actions .action-btn {
            flex: 1;
            max-width: 200px;
        }

        /* 隐藏类 */
        .hidden { display: none !important; }

        /* 反馈提示 */
        .feedback-section {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.8);
                padding: 16px 24px;
                border-radius: 12px;
                z-index: 100;
                display: none;
            }

        .feedback-message {
                color: white;
                font-size: 14px;
                font-weight: 600;
            }

        /* 按钮组 */
        .action-buttons {
                display: flex;
                gap: 12px;
                margin-top: 24px;
            }

        .action-btn {
                flex: 1;
                padding: 12px;
                background: var(--morandi-beige);
                border: 2px solid var(--morandi-rose);
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.3s ease;
                font-size: 14px;
                color: var(--text-dark);
                font-weight: 600;
            }

            .action-btn:hover {
                background: var(--morandi-rose);
            }

            .action-btn.primary {
                background: linear-gradient(135deg, var(--klein-blue), var(--klein-light));
                color: white;
                border: none;
            }

            .action-btn.primary:hover {
                transform: translateY(-2px);
            }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%, 0);
            background: white;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0, 0);
        }

        .toast.success {
                border-left: 4px solid var(--accent-sage);
        }
        .toast.error {
                border-left: 4px solid var(--accent-coral);
        }

        /* 响应式布局 */
        @media (max-width: 768px) {
            .container { padding: 20px 16px; padding-bottom: 100px; }
            .word-card { padding: 24px 16px; margin: 0 -8px; border-radius: 20px; }
            .word-text { font-size: 32px; }
            .word-phonetic { font-size: 14px; }
            .progress-section { padding: 16px; margin-bottom: 20px; }
            .choice-section { padding: 20px 16px; }
            .choice-options { gap: 10px; }
            .choice-option { padding: 14px 16px; font-size: 14px; }
            .action-buttons { flex-direction: column; gap: 10px; }
            .action-btn { width: 100%; padding: 12px; }
            .navbar { padding: 12px 16px; }
            .nav-menu { display: none; }
            .nav-user { gap: 8px; }
        }

        @media (max-width: 480px) {
            .word-text { font-size: 28px; }
            .word-phonetic { font-size: 12px; }
            .stat-value { font-size: 20px; }
            .complete-title { font-size: 24px; }
            .complete-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <span class="hand-letter letter-A">A</span>
        <span class="hand-letter letter-B">B</span>
        <span class="hand-letter letter-C">C</span>
        <span class="hand-letter letter-D">D</span>
        <span class="hand-letter letter-E">E</span>
    </div>

    <!-- 导航栏 (由 page-common.js 插入) -->

    <main class="container">
        <!-- 进度条 -->
        <div class="progress-section">
            <div class="progress-header">
                <span class="progress-text">学习进度:</span>
                <span class="progress-text"><span id="current-index">0</span> / <span id="total-count">0</span></span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- 单词卡片 -->
        <div class="word-card" id="word-card">
            <button class="action-btn" id="btn-favorite" style="position: absolute; top: 16px; right: 16px;">☆</button>
            <button class="action-btn" id="btn-sound" style="position: absolute; top: 16px; left: 16px;">🔊</button>
            <div class="word-text" id="word-text">Loading...</div>
            <div class="word-phonetic" id="word-phonetic"></div>
        </div>

        <!-- 选择题区域 -->
        <div class="choice-section" id="choice-section">
            <div class="choice-title">请选择正确的中文释义</div>
            <div class="choice-options" id="choice-options"></div>
        </div>

        <!-- 翻译题区域 -->
        <div class="translation-section" id="translation-section">
            <div class="translation-title">请输入英文单词</div>
            <input type="text" class="translation-input" id="answer-input" placeholder="输入单词...">
            <button class="submit-btn" id="btn-submit-translation">提交</button>
        </div>

        <!-- 完成提示（保留用于多词学习结束） -->
        <div class="complete-section hidden" id="complete-section">
            <div class="complete-icon">🎉</div>
            <div class="complete-text">学习完成!</div>
            <div class="complete-stats">
                <div class="stat-item">
                    <div class="stat-value" id="final-accuracy">0%</div>
                    <div class="stat-label">准确率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="final-time">0s</div>
                    <div class="stat-label">用时</div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="action-btn" id="complete-go-back">返回首页</button>
                <button class="action-btn primary" id="complete-continue">继续学习</button>
            </div>
        </div>

        <!-- 单词下方内联操作按钮（答题后显示） -->
        <div class="post-answer-actions" id="post-answer-actions">
            <button class="action-btn" id="inline-go-back">返回首页</button>
            <button class="action-btn primary" id="inline-continue">继续学习</button>
        </div>

        <!-- 反馈提示 -->
        <div class="feedback-section" id="feedback-section">
            <div class="feedback-message" id="feedback-message"></div>
        </div>
    </main>

    <script type="module">
        import { apiRequest } from '../js/api-client.js';
        import { showToast, escapeHtml } from '../js/utils.js';
        import { initPage, getCurrentUser } from '../js/page-common.js';

        function getWordId(word) {
            return word.id || word.word_id;
        }

        let currentUser = null;
        let words = [];
        let currentIndex = 0;
        let correctCount = 0;
        let startTime = null;
        let currentWord = null;

        let sessionInfo = null;  // 保存完整的会话信息

        // 页面初始化
        initPage({
            navTarget: 'body',
            onReady: async (user) => {
                currentUser = user;

                // 检查URL参数
                const urlParams = new URLSearchParams(window.location.search);
                const gateId = urlParams.get('gate_id');
                const wordId = urlParams.get('word_id');  // 首页推荐单词点击
                const difficulty = urlParams.get('difficulty');

                // 检查sessionStorage设置
                const settings = sessionStorage.getItem('learning_settings');
                const reviewMode = sessionStorage.getItem('review_mode');

                // 清除sessionStorage标志（防止重复触发）
                sessionStorage.removeItem('review_mode');
                sessionStorage.removeItem('learning_settings');

                if (wordId) {
                    // 学习指定单词（首页推荐点击）
                    await loadSingleWord(parseInt(wordId));
                } else if (gateId) {
                    // 闯关模式
                    await startGateSession(gateId, difficulty || 1);
                } else if (reviewMode === 'true') {
                    // 复习模式
                    await loadReviewWords();
                } else if (settings) {
                    // 有预设设置
                    const parsed = JSON.parse(settings);
                    await startSession(parsed.difficulty || 2, parsed.wordCount || 10);
                } else {
                    // 默认学习模式
                    await startSession(2, 10);
                }
            }
        });

        async function startGateSession(gateId, difficulty) {
            try {
                const result = await apiRequest(`/levels/start/${gateId}`, {
                    method: 'POST',
                    body: JSON.stringify({ user_id: currentUser.id })
                });

                if (result.success) {
                    sessionInfo = result.data;
                    words = result.data.words || [];
                    if (words.length > 0) {
                        currentIndex = 0;
                        startTime = Date.now();
                        showWord();
                    } else {
                        showToast('该关卡暂无单词', 'error');
                        setTimeout(() => window.location.href = 'levels.html', 2000);
                    }
                } else {
                    showToast(result.message || '闯关启动失败', 'error');
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        }

        async function startSession(difficulty, wordCount) {
            try {
                const result = await apiRequest('/vocabulary/start-session', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: currentUser.id, difficulty_level: difficulty, word_count: wordCount })
                });

                if (result.success) {
                    sessionInfo = result.data;  // 保存完整的会话信息
                    words = result.data.words || [];
                    if (words.length > 0) {
                        currentIndex = 0;
                        startTime = Date.now();
                        showWord();
                    } else {
                        showToast('没有可学习的单词', 'error');
                        setTimeout(() => window.location.href = 'dashboard.html', 2000);
                    }
                } else {
                    showToast(result.message || '启动学习失败', 'error');
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        }

        async function loadReviewWords() {
            try {
                const result = await apiRequest(`/learning/review-words/${currentUser.id}?limit=10`);
                if (result.success && result.data?.words?.length > 0) {
                    words = result.data.words;
                    currentIndex = 0;
                    showWord();
                } else {
                    showToast('没有需要复习的单词', 'error');
                    setTimeout(() => window.location.href = 'dashboard.html', 2000);
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        }

        async function loadSingleWord(wordId) {
            // 加载单个单词进行学习（首页推荐点击）
            try {
                const result = await apiRequest(`/vocabulary/learn/${wordId}`);
                if (result.success && result.data) {
                    words = [result.data];
                    currentIndex = 0;
                    startTime = Date.now();
                    showWord();
                } else {
                    showToast('单词加载失败', 'error');
                    setTimeout(() => window.location.href = 'dashboard.html', 2000);
                }
            } catch (e) {
                showToast('网络错误', 'error');
            }
        }

        function showWord() {
            if (currentIndex >= words.length) {
                showComplete();
                return;
            }

            const word = words[currentIndex];
            currentWord = word;
            document.getElementById('word-text').textContent = word.word;
            document.getElementById('word-phonetic').textContent = word.phonetic || '';

            document.getElementById('current-index').textContent = currentIndex + 1;
            document.getElementById('total-count').textContent = words.length;
            document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / words.length) * 100}%`;

            showChoices(word);
        }

        async function showChoices(word) {
            const container = document.getElementById('choice-options');
            container.innerHTML = '<div class="choice-option">加载中...</div>';

            // 如果 word 本身包含 options（来自 /vocabulary/learn/<id>），直接使用
            if (word.options && word.options.length > 0) {
                const correctAnswer = word.correct_answer || word.translation;
                container.innerHTML = word.options.map((opt, i) => `
                    <div class="choice-option" data-index="${i}" data-correct="${escapeHtml(correctAnswer)}">${escapeHtml(opt)}</div>
                `).join('');
                return;
            }

            // 如果没有 sessionInfo（复习模式），直接生成简单选项
            if (!sessionInfo) {
                const correctAnswer = word.translation || word.word;
                const options = generateSimpleOptions(word);
                container.innerHTML = options.map((opt, i) => `
                    <div class="choice-option" data-index="${i}" data-correct="${escapeHtml(correctAnswer)}">${escapeHtml(opt)}</div>
                `).join('');
                return;
            }

            try {
                const result = await apiRequest('/vocabulary/current-word', {
                    method: 'POST',
                    body: JSON.stringify({ session_info: sessionInfo, word_id: getWordId(word) })
                });

                if (result.success && result.data?.question?.options) {
                    const options = result.data.question.options;
                    const correctAnswer = result.data.question.correct_answer;

                    container.innerHTML = options.map((opt, i) => `
                        <div class="choice-option" data-index="${i}" data-correct="${escapeHtml(correctAnswer)}">${escapeHtml(opt)}</div>
                    `).join('');
                } else {
                    // 如果API失败，使用简单选项
                    const correctAnswer = word.translation || word.word;
                    const options = generateSimpleOptions(word);
                    container.innerHTML = options.map((opt, i) => `
                        <div class="choice-option" data-index="${i}" data-correct="${escapeHtml(correctAnswer)}">${escapeHtml(opt)}</div>
                    `).join('');
                }
            } catch (e) {
                // 网络错误时，使用简单选项
                const correctAnswer = word.translation || word.word;
                const options = generateSimpleOptions(word);
                container.innerHTML = options.map((opt, i) => `
                    <div class="choice-option" data-index="${i}" data-correct="${escapeHtml(correctAnswer)}">${escapeHtml(opt)}</div>
                `).join('');
            }
        }

        // 生成简单选项（复习模式或API失败时使用）
        function generateSimpleOptions(word) {
            const correctAnswer = word.translation || word.word;
            const options = [correctAnswer];

            // 从其他单词中随机选择作为干扰项
            const otherWords = words.filter(w => getWordId(w) !== getWordId(word) && w.translation);
            const shuffled = otherWords.sort(() => Math.random() - 0.5);
            const distractors = shuffled.slice(0, 3).map(w => w.translation);

            options.push(...distractors);

            // 如果干扰项不够，添加一些默认选项
            while (options.length < 4) {
                options.push('其他选项');
            }

            // 打乱顺序
            return options.sort(() => Math.random() - 0.5);
        }

        // 事件委托：选择答案
        document.getElementById('choice-options').addEventListener('click', (e) => {
            const option = e.target.closest('.choice-option');
            if (!option) return;
            const index = parseInt(option.dataset.index);
            const correctAnswer = option.dataset.correct;
            selectChoice(index, correctAnswer);
        });

        async function selectChoice(index, correctAnswer) {
            const options = document.querySelectorAll('.choice-option');
            const selectedOption = options[index];
            const selectedText = selectedOption.textContent.trim().replace(/\s+/g, ' ');
            const normalizedCorrect = correctAnswer.trim().replace(/\s+/g, ' ');

            const isCorrect = selectedText.includes(normalizedCorrect) || normalizedCorrect.includes(selectedText);
            correctCount += isCorrect ? 1 : 0;

            options.forEach((opt, i) => {
                opt.onclick = null;
                const optText = opt.textContent.trim().replace(/\s+/g, ' ');
                if (optText.includes(normalizedCorrect) || normalizedCorrect.includes(optText)) {
                    opt.classList.add('correct');
                } else if (i === index) {
                    opt.classList.add('wrong');
                }
            });

            await submitAnswer(isCorrect, selectedText, correctAnswer);
        }

        async function submitAnswer(isCorrect, userAnswer = '', correctAnswer = '') {
            const word = words[currentIndex];
            try {
                const body = {
                    user_id: currentUser.id,
                    word_id: getWordId(word),
                    user_answer: userAnswer || (isCorrect ? 'correct' : 'wrong'),
                    correct_answer: correctAnswer || word.correct_answer || word.translation,
                    is_correct: isCorrect
                };

                // 如果有 sessionInfo，添加它
                if (sessionInfo) {
                    body.session_info = sessionInfo;
                }

                await apiRequest('/vocabulary/submit-answer', {
                    method: 'POST',
                    body: JSON.stringify(body)
                });
            } catch (e) {
                console.error(e);
            }

            setTimeout(() => showPostAnswerButtons(), 1500);  // 1.5秒反馈后显示按钮
        }

        function submitTranslation() {
            const input = document.getElementById('answer-input').value.trim();
            const currentWord = words[currentIndex];
            const isCorrect = input && currentWord?.word?.toLowerCase() === input.toLowerCase();
            correctCount += isCorrect ? 1 : 0;
            submitAnswer(isCorrect);
        }

        function nextWord() {
            currentIndex++;
            // 隐藏内联按钮
            document.getElementById('post-answer-actions').style.display = 'none';
            document.querySelectorAll('.choice-option').forEach(opt => {
                opt.classList.remove('correct', 'wrong', 'selected');
            });
            showWord();
        }

        function showPostAnswerButtons() {
            const actions = document.getElementById('post-answer-actions');
            actions.style.display = 'flex';
        }

        function showComplete() {
            document.getElementById('word-card').style.display = 'none';
            // 移除 hidden 类（使用 !important，必须移除类才能显示）
            const completeSection = document.getElementById('complete-section');
            completeSection.classList.remove('hidden');
            completeSection.style.display = 'block';

            document.getElementById('choice-section').style.display = 'none';
            document.getElementById('translation-section').style.display = 'none';

            const accuracy = words.length > 0 ? Math.round((correctCount / words.length) * 100) : 0;
            const time = Math.round((Date.now() - startTime) / 1000);

            document.getElementById('final-accuracy').textContent = accuracy + '%';
            document.getElementById('final-time').textContent = time + 's';

            // 显示完成消息
            showToast('学习完成！准确率 ' + accuracy + '%', 'success');
        }

        function playSound() {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(currentWord?.word || '');
                utterance.lang = 'en-US';
                speechSynthesis.speak(utterance);
            }
        }

        async function toggleFavorite() {
            if (!currentWord) return;
            const wordId = getWordId(currentWord);
            if (!wordId) return;
            try {
                const result = await apiRequest(`/favorites/${currentUser.id}/word/${wordId}`);
                if (result.success && result.data?.is_favorited) {
                    await apiRequest(`/favorites/${currentUser.id}/word/${wordId}`, { method: 'DELETE' });
                    showToast('已取消收藏');
                    document.getElementById('btn-favorite').textContent = '☆';
                } else {
                    await apiRequest(`/favorites/${currentUser.id}/word/${wordId}`, {
                        method: 'POST',
                        body: JSON.stringify({ word_id: wordId })
                    });
                    showToast('已添加收藏');
                    document.getElementById('btn-favorite').textContent = '★';
                }
            } catch (e) {
                showToast('操作失败', 'error');
            }
        }

        async function continueLearning() {
            // 隐藏按钮
            document.getElementById('post-answer-actions').style.display = 'none';
            document.querySelectorAll('.choice-option').forEach(opt => {
                opt.classList.remove('correct', 'wrong', 'selected');
            });

            if (currentIndex < words.length - 1) {
                // 还有下一个词，直接切换
                nextWord();
            } else {
                // 当前批次学完，重新加载新单词
                showToast('正在加载新单词...', 'success');
                await startSession(2, 10);
            }
        }

        // 初始化已完成（由 initPage 处理）

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        // 暴露到 window 供 onclick 使用（logout 已由 page-common.js 处理）
        // 收藏和发音按钮
        document.getElementById('btn-favorite').addEventListener('click', toggleFavorite);
        document.getElementById('btn-sound').addEventListener('click', playSound);
        document.getElementById('btn-submit-translation').addEventListener('click', submitTranslation);

        // 内联操作按钮事件
        document.getElementById('inline-go-back').addEventListener('click', goBack);
        document.getElementById('inline-continue').addEventListener('click', continueLearning);

        // 完成页面操作按钮
        document.getElementById('complete-go-back').addEventListener('click', goBack);
        document.getElementById('complete-continue').addEventListener('click', goBack);

        // Enter键提交
        document.getElementById('answer-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const input = document.getElementById('answer-input').value.trim();
                const currentWord = words[currentIndex];
                const isCorrect = input && currentWord?.word?.toLowerCase() === input.toLowerCase();
                submitAnswer(isCorrect);
            }
        });
    </script>
</body>
</html>
