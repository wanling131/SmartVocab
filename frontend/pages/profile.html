<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartVocab 个人中心 - 用户信息与成就">
    <title>个人中心 - SmartVocab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23002FA7'/><text x='16' y='21' font-family='Arial' font-size='16' font-weight='bold' fill='white' text-anchor='middle'>SV</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/klein-morandi.css">
    <style>
        /* Page-specific Styles */

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #EBF0F9;
            color: var(--text-dark);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating Hand Letters */
        .bg-decoration {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .hand-letter {
            font-family: 'Caveat', cursive;
            font-size: 56px;
            font-weight: 600;
            color: var(--klein-blue);
            opacity: 0.08;
            position: absolute;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(var(--rotation, 0deg)); }
            50% { transform: translateY(-20px) rotate(calc(var(--rotation, 0deg) + 5deg)); }
        }

        /* Main Container */
        .profile-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .page-title {
            font-size: 36px;
            font-weight: 800;
            color: var(--klein-blue);
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-family: 'Caveat', cursive;
            font-size: 24px;
            color: var(--text-muted);
        }

        /* User Hero Card */
        .user-hero-card {
            background: linear-gradient(135deg, var(--klein-blue) 0%, var(--klein-light) 100%);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 47, 167, 0.25);
        }

        .user-hero-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .user-hero-content {
            display: flex;
            align-items: center;
            gap: 32px;
            position: relative;
            z-index: 1;
        }

        .user-avatar-container {
            position: relative;
        }

        .user-avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 800;
            color: var(--klein-blue);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            border: 4px solid rgba(255, 255, 255, 0.3);
        }

        .avatar-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 32px;
            height: 32px;
            background: var(--accent-amber);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .user-info {
            flex: 1;
            color: white;
        }

        .user-info h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .user-info p {
            opacity: 0.9;
            font-size: 15px;
        }

        .user-level-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 12px;
            backdrop-filter: blur(10px);
        }

        /* Stats Section */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 20px 12px 20px 12px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 3px 3px 0 var(--morandi-lavender);
            border: 2px dashed var(--morandi-rose);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--klein-blue), var(--klein-light));
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 47, 167, 0.12);
            border-color: var(--klein-blue);
            background: #fafcff;
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }

        .stat-card:hover .stat-icon {
            transform: scale(1.2) rotate(5deg);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--klein-blue);
            line-height: 1;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 600;
        }

        /* Section Cards */
        .section-card {
            background: white;
            border-radius: 24px 14px 24px 14px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 3px 3px 0 var(--morandi-lavender);
            border: 2px dashed var(--morandi-rose);
            position: relative;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .section-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--morandi-beige), var(--morandi-rose));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .section-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Achievements Grid */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .achievement-card {
            background: var(--morandi-cream);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 2px solid var(--morandi-beige);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .achievement-card:hover {
            transform: translateY(-2px);
            border-color: var(--klein-blue);
            box-shadow: 0 6px 20px rgba(0, 47, 167, 0.1);
        }

        .achievement-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent-amber), var(--accent-coral));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        /* Unlocked achievement shimmer effect */
        .achievement-card:not(.achievement-locked) .achievement-icon::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: achievementShimmer 3s ease-in-out infinite;
        }

        @keyframes achievementShimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .achievement-info {
            flex: 1;
            min-width: 0;
        }

        .achievement-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .achievement-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .achievement-locked {
            opacity: 0.5;
            filter: grayscale(0.5);
        }

        .achievement-locked .achievement-icon {
            background: var(--morandi-mist);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: var(--morandi-cream);
            border: 2px solid var(--morandi-beige);
            border-radius: 14px;
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--klein-blue);
            box-shadow: 0 0 0 4px rgba(0, 47, 167, 0.1);
            background: white;
        }

        .form-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: var(--morandi-beige);
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        /* Buttons */
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--klein-blue), var(--klein-light));
            color: white;
            box-shadow: 0 4px 16px rgba(0, 47, 167, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 47, 167, 0.35);
        }

        .btn-secondary {
            background: var(--morandi-beige);
            color: var(--text-dark);
            border: 2px solid var(--morandi-rose);
        }

        .btn-secondary:hover {
            background: var(--morandi-rose);
            border-color: var(--morandi-rose);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--accent-coral), #d35d4a);
            color: white;
            box-shadow: 0 4px 16px rgba(224, 122, 95, 0.25);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(224, 122, 95, 0.35);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        /* Warning Box */
        .warning-box {
            background: linear-gradient(135deg, rgba(224, 122, 95, 0.1), rgba(242, 160, 61, 0.1));
            border: 2px solid var(--accent-coral);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .warning-icon {
            font-size: 20px;
        }

        .warning-text {
            font-size: 13px;
            color: var(--text-dark);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 15px;
        }

        /* Decorative Elements */
        .decorative-line {
            height: 4px;
            background: linear-gradient(90deg, var(--klein-blue), var(--accent-amber), var(--klein-blue));
            border-radius: 2px;
            margin: 32px 0;
            opacity: 0.3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-section {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .user-hero-content {
                flex-direction: column;
                text-align: center;
            }

            .user-info h2 {
                font-size: 24px;
            }

            .achievements-grid {
                grid-template-columns: 1fr;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-group .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
        }

        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.2s; opacity: 0; }
        .delay-3 { animation-delay: 0.3s; opacity: 0; }
        .delay-4 { animation-delay: 0.4s; opacity: 0; }

        /* Skeleton Loading */
        .skeleton-text {
            height: 18px;
            background: linear-gradient(90deg, var(--morandi-beige) 25%, var(--morandi-cream) 50%, var(--morandi-beige) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s ease-in-out infinite;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .skeleton-title {
            height: 28px;
            width: 60%;
        }
        .skeleton-value {
            height: 36px;
            width: 40%;
            margin: 8px auto;
        }
        .skeleton-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(90deg, var(--morandi-beige) 25%, var(--morandi-cream) 50%, var(--morandi-beige) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s ease-in-out infinite;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <!-- Background Decoration -->
    <div class="bg-decoration">
        <span class="hand-letter" style="top: 10%; left: 5%; --rotation: -15deg;">P</span>
        <span class="hand-letter" style="top: 20%; right: 8%; --rotation: 12deg;">r</span>
        <span class="hand-letter" style="top: 40%; left: 3%; --rotation: -8deg;">o</span>
        <span class="hand-letter" style="top: 55%; right: 5%; --rotation: 18deg;">f</span>
        <span class="hand-letter" style="top: 75%; left: 8%; --rotation: -20deg;">i</span>
        <span class="hand-letter" style="top: 85%; right: 10%; --rotation: 10deg;">l</span>
        <span class="hand-letter" style="top: 30%; left: 50%; --rotation: -5deg;">e</span>
    </div>

    <!-- Navbar -->
    <nav id="app-navbar" class="navbar">

        </div>

    <main class="profile-container">
        <!-- Page Header -->
        <header class="page-header animate-in">
            <h1 class="page-title">个人中心</h1>
            <p class="page-subtitle">Your Profile & Achievements</p>
        </header>

        <!-- User Hero Card -->
        <section class="user-hero-card animate-in delay-1">
            <div class="user-hero-content">
                <div class="user-avatar-container">
                    <div class="user-avatar" id="profile-avatar">U</div>
                    <div class="avatar-badge">⭐</div>
                </div>
                <div class="user-info">
                    <h2 id="profile-username">加载中...</h2>
                    <p id="profile-email">-</p>
                    <div class="user-level-badge">
                        <span>🎯</span>
                        <span>坚持学习，成就更好的自己</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Stats Section -->
        <section class="stats-section animate-in delay-2">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-value" id="profile-total-words">0</div>
                <div class="stat-label">已学单词</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✨</div>
                <div class="stat-value" id="profile-mastered-words">0</div>
                <div class="stat-label">已掌握</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="profile-streak-days">0</div>
                <div class="stat-label">连续学习天数</div>
            </div>
        </section>

        <!-- Achievements Section -->
        <section class="section-card animate-in delay-3">
            <div class="section-header">
                <div class="section-icon">🏆</div>
                <div>
                    <h3 class="section-title">我的成就</h3>
                    <p class="section-subtitle">记录你的每一个进步</p>
                </div>
            </div>
            <div class="achievements-grid" id="achievements-grid">
                <div class="empty-state">
                    <div class="empty-icon">🏅</div>
                    <p class="empty-text">加载中...</p>
                </div>
            </div>
        </section>

        <!-- Edit Profile Section -->
        <section class="section-card animate-in delay-4">
            <div class="section-header">
                <div class="section-icon">✏️</div>
                <div>
                    <h3 class="section-title">编辑信息</h3>
                    <p class="section-subtitle">更新你的个人资料</p>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="edit-username">用户名</label>
                <input type="text" id="edit-username" class="form-input" disabled>
            </div>
            <div class="form-group">
                <label class="form-label" for="edit-email">邮箱地址</label>
                <input type="email" id="edit-email" class="form-input" placeholder="请输入邮箱">
            </div>
            <div class="btn-group">
                <button id="save-profile-btn" class="btn btn-primary">
                    <span>💾</span> 保存修改
                </button>
            </div>
        </section>

        <!-- Change Password Section -->
        <section class="section-card">
            <div class="section-header">
                <div class="section-icon">🔐</div>
                <div>
                    <h3 class="section-title">修改密码</h3>
                    <p class="section-subtitle">保护你的账号安全</p>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="old-password">当前密码</label>
                <input type="password" id="old-password" class="form-input" placeholder="请输入当前密码">
            </div>
            <div class="form-group">
                <label class="form-label" for="new-password">新密码</label>
                <input type="password" id="new-password" class="form-input" placeholder="至少6个字符">
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm-password">确认新密码</label>
                <input type="password" id="confirm-password" class="form-input" placeholder="再次输入新密码">
            </div>
            <div class="btn-group">
                <button id="change-password-btn" class="btn btn-primary">
                    <span>🔑</span> 修改密码
                </button>
            </div>
        </section>

        <!-- Account Actions Section -->
        <section class="section-card">
            <div class="section-header">
                <div class="section-icon">⚙️</div>
                <div>
                    <h3 class="section-title">账号操作</h3>
                    <p class="section-subtitle">管理你的登录状态</p>
                </div>
            </div>
            <div class="warning-box">
                <span class="warning-icon">⚠️</span>
                <span class="warning-text">退出登录将清除本地登录状态，下次访问需要重新登录</span>
            </div>
            <button id="profile-logout-btn" class="btn btn-danger">
                <span>🚪</span> 退出登录
            </button>
        </section>
    </main>

    <script type="module">
        import { apiRequest, getToken, clearToken } from '../js/api-client.js';
        import { showToast, escapeHtml, animateNumber } from '../js/utils.js';

        // Check login status
        const token = getToken();
        if (!token) {
            window.location.href = 'login.html';
        }

        let currentUser = null;

        // Load user profile
        async function loadUserProfile() {
            try {
                const result = await apiRequest('/auth/profile');
                if (result.success) {
                    currentUser = result.data;
                    renderProfile();
                    loadStats();
                    loadAchievements();
                }
            } catch (err) {
                console.error('加载用户信息失败:', err);
            }
        }

        // Render user profile
        function renderProfile() {
            const avatar = document.getElementById('profile-avatar');
            avatar.textContent = currentUser.username.charAt(0).toUpperCase();
            document.getElementById('profile-username').textContent = currentUser.username;
            document.getElementById('profile-email').textContent = currentUser.email || '-';
            document.getElementById('edit-username').value = currentUser.username;
            document.getElementById('edit-email').value = currentUser.email || '';
        }

        // Load statistics
        async function loadStats() {
            try {
                const result = await apiRequest(`/learning/progress/${currentUser.id}`);
                if (result.success) {
                    const data = result.data || {};
                    animateNumber(document.getElementById('profile-total-words'), data.total_words || 0, 1500);
                    animateNumber(document.getElementById('profile-mastered-words'), data.learned_words || 0, 1500);
                }
            } catch (err) {
                console.error('加载统计失败:', err);
            }
        }

        // Load achievements
        async function loadAchievements() {
            try {
                const result = await apiRequest(`/achievements/${currentUser.id}`);
                if (result.success) {
                    renderAchievements(result.data?.achievements || []);
                }
            } catch (err) {
                console.error('加载成就失败:', err);
            }
        }

        // Render achievements
        function renderAchievements(achievements) {
            const grid = document.getElementById('achievements-grid');
            if (!achievements || achievements.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-icon">🏅</div>
                        <p class="empty-text">暂无成就，继续努力吧！</p>
                    </div>
                `;
                return;
            }
            grid.innerHTML = achievements.map(a => `
                <div class="achievement-card ${a.unlocked === false ? 'achievement-locked' : ''}">
                    <div class="achievement-icon">${a.icon || '🏆'}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${escapeHtml(a.name)}</div>
                        <div class="achievement-desc">${escapeHtml(a.description || '')}</div>
                    </div>
                </div>
            `).join('');
        }

        // Save profile
        document.getElementById('save-profile-btn').addEventListener('click', async () => {
            const email = document.getElementById('edit-email').value;
            try {
                const result = await apiRequest('/auth/profile', {
                    method: 'PUT',
                    body: { email }
                });
                if (result.success) {
                    showToast('保存成功', 'success');
                    loadUserProfile();
                } else {
                    showToast(result.message || '保存失败', 'error');
                }
            } catch (err) {
                showToast('保存失败', 'error');
            }
        });

        // Change password
        document.getElementById('change-password-btn').addEventListener('click', async () => {
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!oldPassword || !newPassword) {
                showToast('请填写完整信息', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                showToast('两次密码不一致', 'error');
                return;
            }
            try {
                const result = await apiRequest(`/auth/password/${currentUser.id}`, {
                    method: 'PUT',
                    body: { old_password: oldPassword, new_password: newPassword }
                });
                if (result.success) {
                    showToast('密码修改成功', 'success');
                    document.getElementById('old-password').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';
                } else {
                    showToast(result.message || '修改失败', 'error');
                }
            } catch (err) {
                showToast('修改失败', 'error');
            }
        });

        // Logout buttons
        document.getElementById('profile-logout-btn').addEventListener('click', () => {
            clearToken();
            window.location.href = 'login.html';
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            clearToken();
            window.location.href = 'login.html';
        });

        // Initialize
        loadUserProfile();
    </script>
</body>
</html>
