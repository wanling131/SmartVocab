<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartVocab 学习统计 - 数据可视化分析">
    <title>学习统计 - SmartVocab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23002FA7'/><text x='16' y='21' font-family='Arial' font-size='16' font-weight='bold' fill='white' text-anchor='middle'>SV</text></svg>">
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Caveat:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/klein-morandi.css">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {
            font-family: 'Nunito', -apple-system, sans-serif;
            background: var(--morandi-cream);
            color: var(--text-dark);
            min-height: 100vh;
            position: relative;
        }

        .bg-decoration {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .letter-A { top: 5%; left: 3%; --rotation: -12deg; }
        .letter-B { top: 20%; right: 5%; --rotation: 8deg; font-size: 36px; }
        .letter-C { top: 40%; left: 2%; --rotation: 5deg; font-size: 52px; }
        .letter-D { top: 65%; right: 3%; --rotation: -10deg; }
        .letter-E { top: 85%; left: 6%; --rotation: 15deg; font-size: 38px; }

        .stats-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: welcome-bounce 0.6s ease-out;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .period-selector {
            display: flex;
            gap: 8px;
            background: white;
            border-radius: 12px;
            padding: 4px;
            border: 1px solid var(--morandi-rose);
            animation: content-slide-in 0.5s ease-out backwards;
            animation-delay: 0.2s;
        }

        .period-btn {
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .period-btn:hover {
            color: var(--text-dark);
        }

        .period-btn.active {
            background: var(--klein-blue);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 16px 10px 16px 10px;
            padding: 24px;
            text-align: center;
            border: 2px dashed var(--morandi-rose);
            box-shadow: 3px 3px 0 var(--morandi-lavender);
            transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                        box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            animation: stat-card-enter 0.5s ease-out backwards;
        }
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 5px 5px 0 var(--morandi-lavender);
        }

        .stat-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--klein-blue);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .stat-trend {
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .stat-trend.up {
            color: var(--accent-sage);
        }

        .stat-trend.down {
            color: var(--accent-coral);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: white;
            border-radius: 20px 12px 20px 12px;
            padding: 24px;
            border: 2px dashed var(--morandi-rose);
            box-shadow: 3px 3px 0 var(--morandi-lavender);
            animation: content-slide-in 0.6s ease-out backwards;
            animation-delay: 0.5s;
        }

        .chart-header {
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        .full-chart {
            background: white;
            border-radius: 20px 12px 20px 12px;
            padding: 24px;
            border: 2px dashed var(--morandi-rose);
            box-shadow: 3px 3px 0 var(--morandi-lavender);
            margin-bottom: 20px;
        }

        .full-chart .chart-container {
            height: 350px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            background: white;
            border: 1px solid var(--morandi-rose);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left: 4px solid var(--accent-sage);
        }

        .toast.error {
            border-left: 4px solid var(--accent-coral);
        }

        /* 响应式布局 */
        @media (max-width: 1024px) {
            .charts-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .stats-container { padding: 20px 16px; }
            .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .period-selector { width: 100%; justify-content: center; }
            .period-btn { padding: 8px 12px; font-size: 12px; }
            .chart-container { height: 250px; }
            .stat-value { font-size: 28px; }
            .stat-card { padding: 16px; }
            .navbar { padding: 12px 16px; }
            .nav-menu { display: none; }
        }

        @media (max-width: 480px) {
            .page-title { font-size: 22px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .stat-card { padding: 12px; }
            .stat-value { font-size: 24px; }
            .stat-label { font-size: 11px; }
            .chart-container { height: 200px; }
            .full-chart { padding: 16px; }
            .chart-card { padding: 16px; }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <span class="hand-letter letter-A">A</span>
        <span class="hand-letter letter-B">B</span>
        <span class="hand-letter letter-C">C</span>
        <span class="hand-letter letter-D">D</span>
        <span class="hand-letter letter-E">E</span>
    </div>

    <!-- 导航栏 (由 page-common.js 插入) -->

    <main class="stats-container page-transition">
        <!-- 页面标题 -->
        <div class="page-header">
            <div>
                <h1 class="page-title">📊 你的学习报告</h1>
                <p class="page-subtitle">用数据见证你的成长轨迹</p>
            </div>
            <div class="period-selector">
                <button class="period-btn active" data-period="7">本周</button>
                <button class="period-btn" data-period="30">本月</button>
                <button class="period-btn" data-period="90">季度</button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-value" id="stat-words">0</div>
                <div class="stat-label">学习词汇</div>
                <div class="stat-trend up" id="trend-words">+0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="stat-learned">0</div>
                <div class="stat-label">已掌握</div>
                <div class="stat-trend up" id="trend-learned">+0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="stat-streak">0</div>
                <div class="stat-label">连续天数</div>
                <div class="stat-trend up" id="trend-streak">+0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏱</div>
                <div class="stat-value" id="stat-time">0h</div>
                <div class="stat-label">学习时长</div>
                <div class="stat-trend up" id="trend-time">+0%</div>
            </div>
        </div>

        <!-- 图表网格 -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">📈 学习趋势</h3>
                </div>
                <div class="chart-container">
                    <canvas id="trend-chart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">📊 难度分布</h3>
                </div>
                <div class="chart-container">
                    <canvas id="difficulty-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- 雷达图 -->
        <div class="full-chart">
            <div class="chart-header">
                <h3 class="chart-title">🎯 能力雷达图</h3>
            </div>
            <div class="chart-container">
                <canvas id="radar-chart"></canvas>
            </div>
        </div>

        <!-- 词性分布 -->
        <div class="full-chart">
            <div class="chart-header">
                <h3 class="chart-title">📝 词性分布</h3>
            </div>
            <div class="chart-container">
                <canvas id="pos-chart"></canvas>
            </div>
        </div>
    </main>

    <script type="module">
        import { apiRequest } from '../js/api-client.js';
        import { showToast, animateNumber } from '../js/utils.js';
        import { initPage, getCurrentUser } from '../js/page-common.js';

        let currentUser = null;
        let charts = {};
        let currentPeriod = 7;


        const COLORS = {
            kleinBlue: '#002FA7',
            kleinLight: '#1a4fd0',
            coral: '#E07A5F',
            sage: '#6B8E6B',
            amber: '#F2A03D',
            lavender: '#9B8AA6'
        };

        initPage({
            navTarget: 'body',
            onReady: async (user) => {
                currentUser = user;
                initEmptyCharts();
                await loadAllData();
                initPeriodButtons();
            }
        });

        async function loadAllData() {
            const [progressRes, statsRes, recordsRes, streakRes] = await Promise.all([
                apiRequest(`/learning/progress/${currentUser.id}?days=${currentPeriod}`).catch(() => ({ success: false })),
                apiRequest(`/learning/statistics/${currentUser.id}?days=${currentPeriod}`).catch(() => ({ success: false })),
                apiRequest(`/learning/records/${currentUser.id}?limit=500`).catch(() => ({ success: false })),
                apiRequest(`/achievements/${currentUser.id}/streak`).catch(() => ({ success: false }))
            ]);

            const progress = progressRes.success ? (progressRes.data || {}) : {};
            const stats = statsRes.success ? (statsRes.data || {}) : {};
            const records = recordsRes.success ? (recordsRes.data || []) : [];
            const streak = streakRes.success ? (streakRes.data?.streak || 0) : 0;

            // Update stat cards
            animateNumber(document.getElementById('stat-words'), progress.total_words || stats.new_words || 0);
            animateNumber(document.getElementById('stat-learned'), progress.learned_words || stats.learned_words || 0);
            document.getElementById('stat-streak').textContent = streak;
            const activeDays = stats.active_days || 0;
            document.getElementById('stat-time').textContent = activeDays > 0 ? `${activeDays}天` : '0天';

            // Update charts with real data
            updateTrendChart(records, stats);
            updateDifficultyChart(records);
            updateRadarChart(progress, records);
            updatePosChart(records);
        }

        function initEmptyCharts() {
            const { kleinBlue, kleinLight, coral, sage, amber, lavender } = COLORS;

            // Trend chart
            charts.trend = new Chart(document.getElementById('trend-chart').getContext('2d'), {
                type: 'line',
                data: {
                    labels: getLastNDays(currentPeriod),
                    datasets: [{
                        label: '学习词汇',
                        data: new Array(currentPeriod).fill(0),
                        borderColor: kleinBlue,
                        backgroundColor: `${kleinBlue}20`,
                        tension: 0.4,
                        fill: true
                    }, {
                        label: '已掌握',
                        data: new Array(currentPeriod).fill(0),
                        borderColor: sage,
                        backgroundColor: `${sage}20`,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // Difficulty distribution
            charts.difficulty = new Chart(document.getElementById('difficulty-chart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: ['初级', '中级', '高级'],
                    datasets: [{
                        data: [1, 1, 1],
                        backgroundColor: [kleinBlue, kleinLight, coral],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } },
                    cutout: '70%'
                }
            });

            // Radar chart
            charts.radar = new Chart(document.getElementById('radar-chart').getContext('2d'), {
                type: 'radar',
                data: {
                    labels: ['词汇量', '掌握率', '复习频率', '难度覆盖', '学习时长'],
                    datasets: [{
                        label: '掌握度',
                        data: [0, 0, 0, 0, 0],
                        borderColor: kleinBlue,
                        backgroundColor: `${kleinBlue}33`,
                        borderWidth: 2,
                        pointBackgroundColor: 'white'
                    }]
                },
                options: {
                    responsive: true,
                    scales: { r: { angleLines: { display: true }, suggestedMin: 0, suggestedMax: 100 } }
                }
            });

            // POS distribution
            charts.pos = new Chart(document.getElementById('pos-chart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: ['名词', '动词', '形容词', '副词', '介词', '连词'],
                    datasets: [{
                        label: '数量',
                        data: [0, 0, 0, 0, 0, 0],
                        backgroundColor: [kleinBlue, kleinLight, coral, amber, sage, lavender],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function updateTrendChart(records, stats) {
            if (!charts.trend) return;
            const days = getLastNDays(currentPeriod);
            const dailyNew = new Array(currentPeriod).fill(0);
            const dailyMastered = new Array(currentPeriod).fill(0);
            const now = new Date();

            records.forEach(r => {
                const reviewed = r.last_reviewed_at || r.created_at;
                if (!reviewed) return;
                const d = new Date(reviewed);
                const diffDays = Math.floor((now - d) / 86400000);
                const idx = currentPeriod - 1 - diffDays;
                if (idx >= 0 && idx < currentPeriod) {
                    dailyNew[idx]++;
                    if (r.is_mastered || r.mastery_level >= 0.8) dailyMastered[idx]++;
                }
            });

            charts.trend.data.labels = days;
            charts.trend.data.datasets[0].data = dailyNew;
            charts.trend.data.datasets[1].data = dailyMastered;
            charts.trend.update();
        }

        function updateDifficultyChart(records) {
            if (!charts.difficulty) return;
            const counts = { easy: 0, medium: 0, hard: 0 };
            records.forEach(r => {
                const d = r.difficulty_level || 3;
                if (d <= 2) counts.easy++;
                else if (d <= 4) counts.medium++;
                else counts.hard++;
            });
            const data = [counts.easy || 1, counts.medium || 1, counts.hard || 1];
            charts.difficulty.data.datasets[0].data = data;
            charts.difficulty.update();
        }

        function updateRadarChart(progress, records) {
            if (!charts.radar) return;
            const total = progress.total_words || records.length || 1;
            const learned = progress.learned_words || records.filter(r => r.is_mastered).length;
            const avgMastery = records.length > 0
                ? Math.round(records.reduce((s, r) => s + (r.mastery_level || 0), 0) / records.length * 100)
                : 0;
            const avgReviews = records.length > 0
                ? Math.round(Math.min(100, records.reduce((s, r) => s + (r.review_count || 0), 0) / records.length * 20))
                : 0;
            const diffRange = new Set(records.map(r => r.difficulty_level)).size;
            const diffCoverage = Math.round(Math.min(100, diffRange / 6 * 100));

            const activeDays = progress.total_reviews > 0 ? Math.min(100, Math.round(learned / total * 100)) : 0;

            charts.radar.data.datasets[0].data = [
                Math.round(learned / total * 100),
                avgMastery,
                avgReviews,
                diffCoverage,
                activeDays
            ];
            charts.radar.update();
        }

        function updatePosChart(records) {
            if (!charts.pos) return;
            const posMap = { 'n': 0, 'v': 0, 'adj': 0, 'adv': 0, 'prep': 0, 'conj': 0 };
            const posLabels = { 'n': '名词', 'v': '动词', 'adj': '形容词', 'adv': '副词', 'prep': '介词', 'conj': '连词' };
            records.forEach(r => {
                const pos = (r.pos || '').toLowerCase().split('.')[0].trim();
                if (posMap.hasOwnProperty(pos)) posMap[pos]++;
                else if (pos.includes('n')) posMap['n']++;
                else if (pos.includes('v')) posMap['v']++;
                else if (pos.includes('adj')) posMap['adj']++;
            });
            charts.pos.data.datasets[0].data = Object.values(posMap);
            charts.pos.update();
        }

        function getLastNDays(n) {
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const labels = [];
            for (let i = n - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                labels.push(i === 0 ? '今天' : i === 1 ? '昨天' : weekdays[d.getDay()]);
            }
            return labels;
        }

        function initPeriodButtons() {
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentPeriod = parseInt(this.dataset.period);
                    loadAllData();
                });
            });
        }
    </script>
</body>
</html>
