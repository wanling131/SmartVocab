<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - SmartVocab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23002FA7'/><text x='16' y='21' font-family='Arial' font-size='16' font-weight='bold' fill='white' text-anchor='middle'>SV</text></svg>">
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Caveat:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/klein-morandi.css">
    <style>
        .letter-A { top: 5%; left: 3%; --rotation: -12deg; }
        .letter-B { top: 20%; right: 5%; --rotation: 8deg; font-size: 36px; }
        .letter-C { top: 40%; left: 2%; --rotation: 5deg; font-size: 52px; }
        .letter-D { top: 65%; right: 3%; --rotation: -10deg; }
        .letter-E { top: 85%; left: 6%; --rotation: 15deg; font-size: 38px; }

        .wave-line { position: absolute; width: 100%; height: 40px; opacity: 0.2; }
        .wave-1 { top: 15%; }
        .wave-2 { top: 45%; }
        .wave-3 { top: 75%; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        /* 欢迎区 */
        .welcome-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            animation: welcome-bounce 0.8s ease-out;
        }

        .welcome-text h1 {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .welcome-text h1 span { color: var(--klein-blue); }
        .welcome-text p { color: var(--text-muted); font-size: 16px; }

        .welcome-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--klein-blue), var(--klein-light));
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0, 47, 167, 0.25);
            position: relative;
            overflow: hidden;
            animation: badge-glow 2s ease-in-out infinite;
        }
        .ai-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 3s infinite;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        .stats-grid .stat-card {
            display: flex;
            flex-direction: column;
            animation: card-spring-in 0.55s cubic-bezier(0.22, 1, 0.36, 1) backwards;
        }
        .stats-grid .stat-card .stat-header { flex-shrink: 0; }
        .stats-grid .stat-card .stat-value { flex: 1; display: flex; align-items: flex-end; }
        .stats-grid .stat-card:nth-child(1) { animation-delay: 0.08s; }
        .stats-grid .stat-card:nth-child(2) { animation-delay: 0.16s; }
        .stats-grid .stat-card:nth-child(3) { animation-delay: 0.24s; }
        .stats-grid .stat-card:nth-child(4) { animation-delay: 0.32s; }

        .stat-card {
            background: white;
            border-radius: 20px 12px 20px 12px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            box-shadow: 3px 3px 0 var(--morandi-lavender);
            border: 2px dashed var(--morandi-rose);
            transition: all 0.3s ease;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        .stat-card:nth-child(1)::before { background: var(--klein-blue); }
        .stat-card:nth-child(2)::before { background: var(--accent-sage); }
        .stat-card:nth-child(3)::before { background: var(--accent-amber); }
        .stat-card:nth-child(4)::before { background: var(--accent-coral); }
        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .stat-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .stat-card:nth-child(1) .stat-icon { background: rgba(0, 47, 167, 0.1); }
        .stat-card:nth-child(2) .stat-icon { background: rgba(107, 142, 107, 0.15); }
        .stat-card:nth-child(3) .stat-icon { background: rgba(242, 160, 61, 0.15); }
        .stat-card:nth-child(4) .stat-icon { background: rgba(224, 122, 95, 0.15); }

        .stat-trend {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
        }
        .stat-trend.up { background: rgba(107, 142, 107, 0.15); color: var(--accent-sage); }

        .stat-value {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 4px;
            transition: all 0.3s ease;
        }
        .stat-card:nth-child(1) .stat-value { color: var(--klein-blue); }
        .stat-card:nth-child(2) .stat-value { color: var(--accent-sage); }
        .stat-card:nth-child(3) .stat-value { color: var(--accent-amber); }
        .stat-card:nth-child(4) .stat-value { color: var(--accent-coral); }

        .stat-label { font-size: 14px; color: var(--text-muted); font-weight: 600; }

        /* 内容网格 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 32px;
        }

        .card {
            background: white;
            border-radius: 24px 14px 24px 14px;
            padding: 28px;
            border: 2px dashed var(--morandi-rose);
            box-shadow: 3px 3px 0 var(--morandi-lavender);
            position: relative;
            animation: content-slide-in 0.6s ease-out backwards;
            animation-delay: 0.4s;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--klein-blue), var(--klein-light));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        /* 推荐列表 */
        .word-list { display: flex; flex-direction: column; gap: 14px; }
        .word-item {
            background: rgba(235, 240, 249, 0.4);
            border: 2px dashed var(--morandi-beige);
            border-radius: 14px 8px 14px 8px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            animation: word-item-enter 0.4s ease-out backwards;
        }
        .word-item:nth-child(1) { animation-delay: 0.05s; }
        .word-item:nth-child(2) { animation-delay: 0.1s; }
        .word-item:nth-child(3) { animation-delay: 0.15s; }
        .word-item:nth-child(4) { animation-delay: 0.2s; }
        .word-item:nth-child(5) { animation-delay: 0.25s; }
        .word-item:hover {
            background: white;
            border-color: var(--klein-blue);
            transform: translateX(8px);
            box-shadow: 0 4px 16px rgba(0, 47, 167, 0.1);
        }
        @keyframes word-item-enter {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .word-item-skeleton {
            background: rgba(235, 240, 249, 0.4);
            border-radius: 14px 8px 14px 8px;
            padding: 18px 20px;
        }
        .word-item-skeleton .skeleton-word { height: 20px; width: 120px; margin-bottom: 8px; }
        .word-item-skeleton .skeleton-desc { height: 14px; width: 180px; }

        .word-info h4 { font-size: 17px; font-weight: 700; color: var(--klein-blue); margin-bottom: 4px; }
        .word-info p { font-size: 13px; color: var(--text-muted); }

        .word-badge {
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--klein-blue), var(--klein-light));
            color: white;
            white-space: nowrap;
        }

        /* 快速开始 */
        .quick-start { display: flex; flex-direction: column; gap: 20px; }
        .quick-card {
            background: rgba(235, 240, 249, 0.5);
            border: 2px dashed var(--morandi-beige);
            border-radius: 18px 10px 18px 10px;
            padding: 24px;
            transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                        box-shadow 0.3s cubic-bezier(0.22, 1, 0.36, 1),
                        background-color 0.2s ease;
        }
        .quick-card:hover { background: white; transform: translateY(-3px); box-shadow: 3px 3px 0 var(--morandi-lavender); }
        .quick-card h4 {
            font-size: 16px; font-weight: 700; color: var(--text-dark);
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }
        .quick-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 11px; color: var(--text-muted);
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
        }
        .form-group select, .form-group input {
            width: 100%; padding: 12px 14px;
            background: white; border: 2px solid var(--morandi-rose);
            border-radius: 12px; color: var(--text-dark);
            font-size: 14px; font-family: inherit; transition: all 0.3s ease;
        }
        .form-group select:focus, .form-group input:focus {
            outline: none; border-color: var(--klein-blue);
            box-shadow: 0 0 0 4px rgba(0, 47, 167, 0.1);
        }

        .review-stat {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; background: white; border-radius: 14px;
            margin-bottom: 16px; border: 1px solid var(--morandi-beige);
        }
        .review-stat span:first-child { color: var(--text-muted); font-size: 14px; font-weight: 600; }
        .review-stat span:last-child { font-size: 32px; font-weight: 800; color: var(--accent-amber); }

        /* Streak 区域 */
        .streak-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            padding: 12px 0;
            border-bottom: 1px dashed var(--morandi-rose);
            animation: content-slide-in 0.6s ease-out backwards;
            animation-delay: 0.5s;
        }
        .streak-section .streak-fire {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: linear-gradient(135deg, #FF6B35, #F7931E, #FFD700);
            border-radius: 30px;
            color: white;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.4);
            position: relative;
            overflow: hidden;
        }
        .streak-section .streak-fire::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        .streak-fire .flame-icon {
            font-size: 22px;
            animation: flame-dance 0.6s ease-in-out infinite alternate;
        }
        @keyframes flame-dance {
            0% { transform: scaleY(1) rotate(-3deg); }
            100% { transform: scaleY(1.15) rotate(3deg); }
        }
        .streak-fire .streak-count {
            position: relative; z-index: 1;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .streak-hint {
            font-size: 13px; color: var(--text-muted); font-weight: 600;
            font-family: 'Caveat', cursive;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; flex-wrap: wrap; gap: 12px; }
            .nav-menu { order: 3; width: 100%; justify-content: center; flex-wrap: wrap; }
            .container { padding: 20px; }
            .stats-grid { grid-template-columns: 1fr; }
            .welcome-section { flex-direction: column; text-align: center; gap: 20px; }
            .welcome-right { justify-content: center; }
            .streak-section { justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <span class="hand-letter letter-A">A</span>
        <span class="hand-letter letter-B">B</span>
        <span class="hand-letter letter-C">C</span>
        <span class="hand-letter letter-D">D</span>
        <span class="hand-letter letter-E">E</span>
        <div class="wave-line wave-1">
            <svg viewBox="0 0 1200 40" preserveAspectRatio="none">
                <path d="M0,20 Q150,10 300,20 T600,20 T900,20 T1200,20" stroke="#002FA7" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="wave-line wave-2">
            <svg viewBox="0 0 1200 40" preserveAspectRatio="none">
                <path d="M0,20 Q150,30 300,20 T600,20 T900,20 T1200,20" stroke="#E07A5F" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="6,4"/>
            </svg>
        </div>
        <div class="wave-line wave-3">
            <svg viewBox="0 0 1200 40" preserveAspectRatio="none">
                <path d="M0,20 Q150,15 300,20 T600,20 T900,20 T1200,20" stroke="#6B8E6B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <main class="container page-transition">
        <!-- 欢迎区 -->
        <section class="welcome-section">
            <div class="welcome-text">
                <h1>欢迎回来，<span id="welcome-name">学习者</span></h1>
                <p id="welcome-subtitle">今天也要元气满满地学英语呀</p>
            </div>
            <div class="welcome-right">
                <div class="ai-badge">
                    <span>✨</span>
                    <span>AI 智能推荐</span>
                </div>
            </div>
        </section>

        <!-- Streak 火焰 -->
        <div class="streak-section" id="streak-section" style="display:none;">
            <div class="streak-fire">
                <span class="flame-icon">🔥</span>
                <span class="streak-count" id="streak-count">0天连续</span>
            </div>
            <span class="streak-hint" id="streak-hint">继续保持！</span>
        </div>

        <!-- 统计卡片 -->
        <section class="stats-grid">
            <div class="stat-card card-glow">
                <div class="stat-header">
                    <div class="stat-icon">📚</div>
                    <span class="stat-trend up" id="trend-total">--</span>
                </div>
                <div class="stat-value" id="total-words">0</div>
                <div class="stat-label">已学词汇</div>
            </div>
            <div class="stat-card card-glow">
                <div class="stat-header">
                    <div class="stat-icon">✅</div>
                    <span class="stat-trend up" id="trend-learned">--</span>
                </div>
                <div class="stat-value" id="learned-words">0</div>
                <div class="stat-label">已掌握</div>
            </div>
            <div class="stat-card card-glow">
                <div class="stat-header">
                    <div class="stat-icon">📖</div>
                </div>
                <div class="stat-value" id="learning-words">0</div>
                <div class="stat-label">学习中</div>
            </div>
            <div class="stat-card card-glow">
                <div class="stat-header">
                    <div class="stat-icon">🎯</div>
                </div>
                <div class="stat-value" id="mastery-rate">0%</div>
                <div class="stat-label">掌握率</div>
            </div>
        </section>

        <!-- 内容网格 -->
        <div class="content-grid">
            <section class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="card-title-icon">🔥</span>
                        为你推荐
                    </h3>
                    <button class="btn btn-ghost" id="btn-refresh">换一批</button>
                </div>
                <div class="word-list" id="recommendations-list">
                    <div class="word-item-skeleton skeleton-box skeleton-word"></div>
                    <div class="word-item-skeleton skeleton-box skeleton-word"></div>
                    <div class="word-item-skeleton skeleton-box skeleton-word"></div>
                    <div class="word-item-skeleton skeleton-box skeleton-word"></div>
                    <div class="word-item-skeleton skeleton-box skeleton-word"></div>
                </div>
            </section>

            <section class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <span class="card-title-icon">🚀</span>
                        快速开始
                    </h3>
                </div>
                <div class="quick-start">
                    <div class="quick-card">
                        <h4>📝 新词学习</h4>
                        <p>系统根据难度智能推荐</p>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="difficulty">难度</label>
                                <select id="difficulty">
                                    <option value="1">初级</option>
                                    <option value="2" selected>中级</option>
                                    <option value="3">高级</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="word-count">数量</label>
                                <input type="number" id="word-count" value="10" min="5" max="50">
                            </div>
                        </div>
                        <button class="btn btn-primary" id="btn-start-learning" style="width:100%">开始学习</button>
                    </div>

                    <div class="quick-card">
                        <h4>🔄 复习模式</h4>
                        <p>基于艾宾浩斯遗忘曲线</p>
                        <div class="review-stat">
                            <span>待复习词汇</span>
                            <span id="review-count">--</span>
                        </div>
                        <button class="btn btn-primary" id="btn-start-review" style="width:100%">开始复习</button>
                    </div>

                    <div class="quick-card">
                        <h4>📕 错题本</h4>
                        <p>针对性复习答错的单词</p>
                        <div class="review-stat">
                            <span>错题数量</span>
                            <span id="mistake-count">--</span>
                        </div>
                        <button class="btn btn-secondary" id="btn-start-mistake" style="width:100%">复习错题</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { apiRequest } from '../js/api-client.js';
        import { showToast, escapeHtml, animateNumber } from '../js/utils.js';
        import { initPage, getCurrentUser } from '../js/page-common.js';

        let recPageIndex = 0;

        initPage({
            navTarget: 'body',
            onReady: async (user) => {
                currentUser = user;
                document.getElementById('welcome-name').textContent = currentUser.username;
                updateWelcomeSubtitle();
                loadProgress();
                loadRecommendations();
                loadReviewCount();
                loadMistakeCount();
                loadStreak();
            }
        });

        function updateWelcomeSubtitle() {
            const hour = new Date().getHours();
            const el = document.getElementById('welcome-subtitle');
            if (hour < 6) el.textContent = '夜猫子模式启动，来背几个词再睡吧';
            else if (hour < 9) el.textContent = '早安！清晨是记忆的黄金时间';
            else if (hour < 12) el.textContent = '上午好！今天也要元气满满地学英语呀';
            else if (hour < 14) el.textContent = '午饭后犯困？不如来背几个词提提神';
            else if (hour < 18) el.textContent = '下午好！坚持就是胜利';
            else if (hour < 22) el.textContent = '晚上好！今天的学习任务完成了吗';
            else el.textContent = '夜深了，学完这些就早点休息吧';
        }

        async function loadProgress() {
            const [progressRes, statsRes] = await Promise.all([
                apiRequest(`/learning/progress/${currentUser.id}`).catch(() => ({ success: false })),
                apiRequest(`/learning/statistics/${currentUser.id}?days=7`).catch(() => ({ success: false }))
            ]);
            if (progressRes.success) {
                const d = progressRes.data || {};
                animateNumber(document.getElementById('total-words'), d.total_words || 0);
                animateNumber(document.getElementById('learned-words'), d.learned_words || 0);
                animateNumber(document.getElementById('learning-words'), d.learning_words || 0);
                const rate = Math.round((d.mastery_rate || 0) * 100);
                animateNumber(document.getElementById('mastery-rate'), rate, 800);
                setTimeout(() => {
                    document.getElementById('mastery-rate').textContent = rate + '%';
                }, 850);
                // Update trends from statistics
                if (statsRes.success) {
                    const s = statsRes.data || {};
                    const totalTrend = s.new_words > 0 ? `+${s.new_words}词` : '--';
                    const learnedTrend = s.learned_words > 0 ? `+${s.learned_words}词` : '--';
                    document.getElementById('trend-total').textContent = totalTrend;
                    document.getElementById('trend-learned').textContent = learnedTrend;
                }
            } else {
                document.getElementById('total-words').textContent = '--';
                document.getElementById('learned-words').textContent = '--';
                document.getElementById('learning-words').textContent = '--';
                document.getElementById('mastery-rate').textContent = '--';
            }
        }

        async function loadStreak() {
            try {
                const result = await apiRequest(`/achievements/${currentUser.id}/streak`);
                if (result.success && result.data) {
                    const days = result.data.streak_days || result.data.current_streak || 0;
                    if (days > 0) {
                        document.getElementById('streak-section').style.display = 'flex';
                        document.getElementById('streak-count').textContent = days + '天连续';
                        const flames = Math.min(Math.floor(days / 3) + 1, 4);
                        const flameEl = document.querySelector('.flame-icon');
                        document.querySelector('.flame-icon').textContent = '🔥'.repeat(flames);
                        const hints = ['继续保持！', '你太棒了！', '势不可挡！', '学霸附体！'];
                        document.getElementById('streak-hint').textContent = hints[Math.min(Math.floor(days / 5), 3)];
                    }
                }
            } catch (e) { /* streak is optional */ }
        }

        async function loadRecommendations(forceRefresh = false) {
            const page = forceRefresh ? 0 : recPageIndex;
            const list = document.getElementById('recommendations-list');

            list.innerHTML = `
                <div class="word-item-skeleton skeleton-box skeleton-word"></div>
                <div class="word-item-skeleton skeleton-box skeleton-word"></div>
                <div class="word-item-skeleton skeleton-box skeleton-word"></div>
                <div class="word-item-skeleton skeleton-box skeleton-word"></div>
                <div class="word-item-skeleton skeleton-box skeleton-word"></div>
            `;

            const url = `/recommendations/${currentUser.id}?limit=5&page=${page}${forceRefresh ? '&refresh=true' : ''}`;
            const result = await apiRequest(url);

            if (result.success && result.data?.words?.length > 0) {
                recPageIndex = result.data.page + 1;
                if (!result.data.has_more) recPageIndex = 0;

                list.innerHTML = result.data.words.map((w, i) => `
                    <div class="word-item" data-word-id="${w.id}" style="animation-delay: ${i * 0.05}s">
                        <div class="word-info">
                            <h4>${escapeHtml(w.word)}</h4>
                            <p>${escapeHtml(w.translation) || ''}</p>
                        </div>
                        <span class="word-badge">${escapeHtml(w.reason) || '推荐'}</span>
                    </div>
                `).join('');
            } else {
                list.innerHTML = `
                    <div class="empty-illustration">
                        <svg viewBox="0 0 120 120" fill="none">
                            <circle cx="60" cy="60" r="50" stroke="var(--morandi-rose)" stroke-width="2" stroke-dasharray="6,4"/>
                            <text x="60" y="65" text-anchor="middle" font-size="36">📚</text>
                        </svg>
                        <div class="empty-title">暂无推荐</div>
                        <div class="empty-desc">开始学习后，AI 将为你智能推荐</div>
                        <a href="learning.html" class="empty-action">开始第一次学习</a>
                    </div>`;
            }
        }

        async function loadReviewCount() {
            const result = await apiRequest(`/learning/review-words/${currentUser.id}/count`);
            if (result.success) {
                document.getElementById('review-count').textContent = result.data?.count || 0;
            }
        }

        async function loadMistakeCount() {
            const result = await apiRequest(`/vocabulary/mistakes/${currentUser.id}/count`);
            if (result.success) {
                document.getElementById('mistake-count').textContent = result.data?.count || 0;
            }
        }

        document.getElementById('btn-refresh').addEventListener('click', async () => {
            await loadRecommendations(false);
            showToast('换了一批新词，快来看看吧');
        });

        document.getElementById('btn-start-learning').addEventListener('click', () => {
            sessionStorage.setItem('learning_settings', JSON.stringify({
                difficulty: document.getElementById('difficulty').value,
                wordCount: document.getElementById('word-count').value
            }));
            window.location.href = 'learning.html';
        });

        document.getElementById('btn-start-review').addEventListener('click', () => {
            sessionStorage.setItem('review_mode', 'true');
            window.location.href = 'learning.html';
        });

        document.getElementById('btn-start-mistake').addEventListener('click', () => {
            sessionStorage.setItem('mistake_review_mode', 'true');
            window.location.href = 'learning.html';
        });

        async function learnWord(id) {
            const result = await apiRequest('/vocabulary/start-session', {
                method: 'POST',
                body: JSON.stringify({
                    user_id: currentUser.id,
                    difficulty_level: 2,
                    word_count: 10,
                    first_word_id: id
                })
            });
            if (result.success) {
                sessionStorage.setItem('learning_settings', JSON.stringify({
                    difficulty: 2, wordCount: 10, sessionInfo: result.data
                }));
                window.location.href = 'learning.html';
            } else {
                showToast('启动学习失败', 'error');
            }
        }

        document.getElementById('recommendations-list').addEventListener('click', (e) => {
            const item = e.target.closest('.word-item');
            if (item && item.dataset.wordId) learnWord(item.dataset.wordId);
        });
    </script>
</body>
</html>
