<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartVocab - AI智能英语学习</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23000'/><text x='16' y='21' font-family='Arial' font-size='18' font-weight='bold' fill='%2300ff88' text-anchor='middle'>S</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --neon-green: #00ff88;
            --neon-blue: #00d4ff;
            --neon-purple: #bf00ff;
            --dark-bg: #0a0a0f;
            --card-bg: rgba(20, 20, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: var(--dark-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        /* 动态网格背景 */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        /* 光晕效果 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .glow-orb.green {
            width: 400px;
            height: 400px;
            background: var(--neon-green);
            top: -100px;
            left: -100px;
        }

        .glow-orb.blue {
            width: 350px;
            height: 350px;
            background: var(--neon-blue);
            bottom: -80px;
            right: -80px;
            animation-delay: -3s;
        }

        .glow-orb.purple {
            width: 300px;
            height: 300px;
            background: var(--neon-purple);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.2;
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.1); }
            66% { transform: translate(-20px, 30px) scale(0.95); }
        }

        /* 漂浮字母 */
        .floating-letters {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .letter {
            position: absolute;
            font-size: 24px;
            font-weight: 700;
            color: transparent;
            -webkit-text-stroke: 1px rgba(0, 255, 136, 0.2);
            animation: letterFloat 20s linear infinite;
        }

        @keyframes letterFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* 主容器 */
        .container {
            position: relative;
            width: 420px;
            z-index: 10;
        }

        /* Logo区域 */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #000;
            box-shadow:
                0 0 30px rgba(0, 255, 136, 0.4),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); }
            50% { box-shadow: 0 0 50px rgba(0, 255, 136, 0.6), 0 0 80px rgba(0, 212, 255, 0.3); }
        }

        .logo-text {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .tagline {
            margin-top: 16px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tagline span {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* 玻璃卡片 */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        /* 卡片顶部光效 */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                var(--neon-green),
                var(--neon-blue),
                transparent);
        }

        /* Tab 切换 */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .tab-btn.active {
            background: rgba(0, 255, 136, 0.1);
            color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        /* 表单 */
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: formSlide 0.4s ease;
        }

        @keyframes formSlide {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 输入框组 */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 20px;
            padding-left: 48px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            font-size: 15px;
            color: #fff;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--neon-green);
            background: rgba(0, 255, 136, 0.02);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus + .input-icon {
            opacity: 1;
            filter: drop-shadow(0 0 8px var(--neon-green));
        }

        /* AI 提示 */
        .ai-hint {
            display: none;
            font-size: 11px;
            color: var(--neon-blue);
            margin-top: 8px;
            padding-left: 4px;
            animation: hintFade 0.3s ease;
        }

        .input-wrapper input:focus ~ .ai-hint {
            display: block;
        }

        @keyframes hintFade {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 按钮 */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
            color: #000;
            margin-top: 8px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow:
                0 10px 40px rgba(0, 255, 136, 0.3),
                0 0 60px rgba(0, 212, 255, 0.2);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* 加载状态 */
        .btn.loading {
            pointer-events: none;
            color: transparent;
        }

        .btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            top: 50%;
            left: 50%;
            margin: -10px 0 0 -10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 错误提示 */
        .error-message {
            margin-top: 16px;
            padding: 14px 16px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
            border-radius: 10px;
            color: #ff6b6b;
            font-size: 13px;
            display: none;
            animation: errorShake 0.4s ease;
        }

        .error-message.show { display: block; }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        /* 底部链接 */
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .footer-text a {
            color: var(--neon-green);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .footer-text a:hover {
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* 装饰性代码片段 */
        .code-decoration {
            position: fixed;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            color: rgba(0, 255, 136, 0.15);
            pointer-events: none;
            z-index: 1;
        }

        .code-decoration.top-left {
            top: 40px;
            left: 40px;
        }

        .code-decoration.bottom-right {
            bottom: 40px;
            right: 40px;
            text-align: right;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 10000;
            animation: toastIn 0.4s ease;
        }

        .toast.success {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
        }

        .toast.error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
        }

        @keyframes toastIn {
            from { transform: translateY(20px) translateX(20px); opacity: 0; }
            to { transform: translateY(0) translateX(0); opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .container { width: 90%; }
            .glass-card { padding: 24px; }
            .logo-text { font-size: 26px; }
        }
    </style>
</head>
<body>
    <!-- 背景效果 -->
    <div class="grid-bg"></div>
    <div class="glow-orb green"></div>
    <div class="glow-orb blue"></div>
    <div class="glow-orb purple"></div>
    <div class="floating-letters" id="letters"></div>

    <!-- 代码装饰 -->
    <div class="code-decoration top-left">
        <div>// AI Learning Engine</div>
        <div>const model = new SmartVocab();</div>
        <div>model.initialize();</div>
    </div>
    <div class="code-decoration bottom-right">
        <div>accuracy: 98.7%</div>
        <div>words_learned: 2,847</div>
        <div>status: active</div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo">
                <div class="logo-icon">S</div>
                <span class="logo-text">SmartVocab</span>
            </div>
            <p class="tagline"><span>AI</span> Powered English Learning</p>
        </div>

        <!-- 登录卡片 -->
        <div class="glass-card">
            <!-- Tab 切换 -->
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <input type="text" id="login-username" placeholder="请输入用户名" required autocomplete="username">
                        <span class="input-icon">👤</span>
                        <span class="ai-hint">✨ 正在为你匹配学习方案...</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="login-password" placeholder="请输入密码" required autocomplete="current-password">
                        <span class="input-icon">🔐</span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span class="btn-text">开始学习</span>
                </button>
                <div class="error-message" id="login-error"></div>
            </form>

            <!-- 注册表单 -->
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <input type="text" id="register-username" placeholder="3-16个字符" required minlength="3" maxlength="16" autocomplete="username">
                        <span class="input-icon">👤</span>
                        <span class="ai-hint">✨ 这个名字将开启你的学习之旅</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>邮箱 <span style="opacity:0.5">(可选)</span></label>
                    <div class="input-wrapper">
                        <input type="email" id="register-email" placeholder="用于找回密码" autocomplete="email">
                        <span class="input-icon">📧</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="register-password" placeholder="至少6个字符" required minlength="6" autocomplete="new-password">
                        <span class="input-icon">🔐</span>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="register-btn">
                    <span class="btn-text">创建账号</span>
                </button>
                <div class="error-message" id="register-error"></div>
            </form>

            <p class="footer-text">
                智能推荐 · 高效记忆 · 科学复习
            </p>
        </div>
    </div>

    <script>
        // 创建漂浮字母
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        const container = document.getElementById('letters');
        for (let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.className = 'letter';
            el.textContent = letters[Math.floor(Math.random() * letters.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.animationDelay = Math.random() * 20 + 's';
            el.style.animationDuration = (15 + Math.random() * 10) + 's';
            container.appendChild(el);
        }

        // API 配置
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:5000/api' : `http://${window.location.hostname}:5000/api`;

        function getToken() { return localStorage.getItem('auth_token'); }
        function setToken(t) { localStorage.setItem('auth_token', t); }
        function clearToken() { localStorage.removeItem('auth_token'); localStorage.removeItem('currentUser'); }

        async function apiRequest(endpoint, options = {}) {
            const token = getToken();
            try {
                const res = await fetch(API_BASE + endpoint, {
                    method: options.method || 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                    },
                    body: options.body
                });
                if (res.status === 401) { clearToken(); }
                return await res.json();
            } catch (e) { return { success: false, message: '网络错误' }; }
        }

        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // Tab 切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.getElementById('login-form').classList.toggle('active', tab === 'login');
                document.getElementById('register-form').classList.toggle('active', tab === 'register');
            });
        });

        // 登录
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const error = document.getElementById('login-error');
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            error.classList.remove('show');
            btn.classList.add('loading');

            const result = await apiRequest('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });

            btn.classList.remove('loading');

            if (result.success) {
                setToken(result.data.token);
                localStorage.setItem('currentUser', JSON.stringify(result.data.user));
                showToast('登录成功！欢迎回来 🎉');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                error.textContent = result.message || '登录失败';
                error.classList.add('show');
            }
        });

        // 注册
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            const error = document.getElementById('register-error');
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;

            error.classList.remove('show');
            btn.classList.add('loading');

            const result = await apiRequest('/auth/register', {
                method: 'POST',
                body: JSON.stringify({ username, email, password })
            });

            btn.classList.remove('loading');

            if (result.success) {
                setToken(result.data.token);
                localStorage.setItem('currentUser', JSON.stringify(result.data.user));
                showToast('注册成功！开始学习之旅 🚀');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } else {
                error.textContent = result.message || '注册失败';
                error.classList.add('show');
            }
        });

        // 检查登录状态
        if (getToken()) {
            apiRequest('/auth/profile').then(r => {
                if (r.success) window.location.href = 'dashboard.html';
            });
        }
    </script>
</body>
</html>
