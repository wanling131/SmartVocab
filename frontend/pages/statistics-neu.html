<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartVocab 学习统计 - 数据可视化分析">
    <title>学习统计 - SmartVocab</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height="32" rx="8" fill='%23002FA7'/><text x='16' y='21' font-family='Arial' font-size='16' font-weight='bold' fill='white' text-anchor='middle'>SV</text></svg>">
    <link rel="stylesheet" href="klein-morandi.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body {
            font-family: 'Nunito', -apple-system, sans-serif;
            background: var(--morandi-cream);
            color: var(--text-dark);
            min-height: 100vh;
            position: relative;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .hand-letter {
            font-family: 'Caveat', cursive;
            font-size: 48px;
            font-weight: 600;
            color: var(--klein-blue);
            opacity: 0.1;
            position: absolute;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(var(--rotation, 0deg)); }
            50% { transform: translateY(-15px) rotate(calc(var(--rotation, 0deg) + 3deg)); }
        }
        .letter-A { top: 5%; left: 3%; --rotation: -12deg; }
        .letter-B { top: 20%; right: 5%; --rotation: 8deg; font-size: 36px; }
        .letter-C { top: 40%; left: 2%; --rotation: 5deg; font-size: 52px; }
        .letter-D { top: 65%; right: 3%; --rotation: -10deg; }
        .letter-E { top: 85%; left: 6%; --rotation: 15deg; font-size: 38px; }

        /* 主容器 */
        .stats-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
            position: relative;
            z-index: 1;
        }
        /* 页面标题 */
        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .page-subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }
        /* 屨期选择 */
        .period-selector {
            display: flex;
            gap: 8px;
            background: white;
            border-radius: 12px;
            padding: 4px;
            border: 1px solid var(--morandi-rose);
        }
        .period-btn {
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .period-btn:hover {
            color: var(--text-dark);
        }
        .period-btn.active {
            background: var(--klein-blue);
            color: white;
        }
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--morandi-rose);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        .stat-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--klein-blue);
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .stat-trend {
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }
        .stat-trend.up {
            color: var(--accent-sage);
        }
        .stat-trend.down {
            color: var(--accent-coral);
        }
        /* 图表区域 */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--morandi-rose);
        }
        .chart-header {
            margin-bottom: 20px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-container {
            height: 300px;
            position: relative;
        }
        /* 黡屏图表 */
        .full-chart {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--morandi-rose);
            margin-bottom: 20px;
        }
        .full-chart .chart-container {
            height: 350px;
        }
        /* 鴻鸟效果 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }
        .toast.show {
            transform: translateX(0);
            background: white;
            border: 1px solid var(--morandi-rose);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .toast.success {
            border-left: 4px solid var(--accent-sage);
        }
        .toast.error {
            border-left: 4px solid var(--accent-coral);
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <span class="hand-letter letter-A">A</span>
        <span class="hand-letter letter-B">B</span>
        <span class="hand-letter letter-C">C</span>
        <span class="hand-letter letter-D">D</span>
        <span class="hand-letter letter-E">E</span>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="dashboard.html" class="nav-brand">
            <div class="nav-logo">SV</div>
            <span class="nav-title">SmartVocab</span>
        </a>
        <div class="nav-menu">
            <a href="dashboard.html" class="nav-link">🏠 首页</a>
            <a href="learning.html" class="nav-link">📖 学习</a>
            <a href="statistics.html" class="nav-link active">📊 统计</a>
            <a href="favorites.html" class="nav-link">⭐ 收藏</a>
        </div>
        <div class="nav-user">
            <span class="user-name" id="username-display">用户</span>
            <button class="btn btn-ghost" onclick="logout()">退出</button>
        </div>
    </nav>

    <main class="stats-container">
        <!-- 页面标题 -->
        <div class="page-header">
            <div>
                <h1 class="page-title">📊 学习统计</h1>
                <p class="page-subtitle">AI 驱动的智能学习数据分析</p>
            </div>
            <!-- 周期选择 -->
            <div class="period-selector">
                <button class="period-btn active" data-period="7">本周</button>
                <button class="period-btn" data-period="30">本月</button>
                <button class="period-btn" data-period="90">季度</button>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-value" id="stat-words">0</div>
                <div class="stat-label">学习词汇</div>
                <div class="stat-trend up" id="trend-words">+0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="stat-learned">0</div>
                <div class="stat-label">已掌握</div>
                <div class="stat-trend up" id="trend-learned">+0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="stat-streak">0</div>
                <div class="stat-label">连续天数</div>
                <div class="stat-trend up" id="trend-streak">+0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏱</div>
                <div class="stat-value" id="stat-time">0h</div>
                <div class="stat-label">学习时长</div>
                <div class="stat-trend up" id="trend-time">+0%</div>
            </div>
        </div>

        <!-- 图表网格 -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">📈 学习趋势</h3>
                </div>
                <div class="chart-container">
                    <canvas id="trend-chart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <h3 class="chart-title">📊 険度分布</h3>
                </div>
                <div class="chart-container">
                    <canvas id="difficulty-chart"></canvas>
                </div>
            </div>
        </div>

        <!-- 全宽图表 -->
        <div class="full-chart">
            <div class="chart-header">
                <h3 class="chart-title">🎯 词汇掌握度雷达图</h3>
            </div>
            <div class="chart-container">
                <canvas id="radar-chart"></canvas>
            </div>
        </div>

        <!-- 全宽图表 -->
        <div class="full-chart">
            <div class="chart-header">
                <h3 class="chart-title">📝 词性分布</h3>
            </div>
            <div class="chart-container">
                <canvas id="pos-chart"></canvas>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
